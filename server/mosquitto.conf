# =============================================================================
# EnerSense — mosquitto.conf
# Local Mosquitto broker configuration for development and simulation.
#
# Usage:
#   Linux / macOS : mosquitto -c server/mosquitto.conf
#   Windows       : mosquitto.exe -c server\mosquitto.conf
#
# Mosquitto install:
#   Ubuntu/Debian : sudo apt install mosquitto mosquitto-clients
#   macOS         : brew install mosquitto
#   Windows       : https://mosquitto.org/download/
# =============================================================================

# --- Network -----------------------------------------------------------------
listener 1884
# Bind to all interfaces so the Wokwi CLI tunnel can reach the broker.
# On a production deployment restrict to 127.0.0.1 or your LAN IP.
bind_address 0.0.0.0

# --- Authentication ----------------------------------------------------------
# Password file is generated with:
#   mosquitto_passwd -c server/passwd enersense
# Then enter "enersense123" when prompted.
# The same credentials must match MQTT_USER / MQTT_PASSWORD in config.py.
password_file passwd

# Reject unauthenticated connections
allow_anonymous false

# --- Persistence -------------------------------------------------------------
# Store retained messages and QoS 1/2 queues across broker restarts.
persistence       true
persistence_file  enersense.db
persistence_location  ./

# --- Logging -----------------------------------------------------------------
log_dest   stdout
log_dest   file mosquitto.log
log_type   error
log_type   warning
log_type   notice
log_type   information
# Uncomment for full subscribe/publish debug output:
# log_type  subscribe
# log_type  publish

# --- QoS and message limits --------------------------------------------------
max_queued_messages   1000
max_inflight_messages 20

# --- Keep-alive --------------------------------------------------------------
# Clients that do not send a PINGREQ within 1.5 × keepalive are disconnected.
# ESP32 keepalive is set to 60s in config.py, so the effective timeout is 90s.